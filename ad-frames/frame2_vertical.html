<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Frame 2 Vertical - The Pain</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    background: #0D0D0D;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden;
  }

  .eyebrow {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 8px;
    color: #C9A035;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 60px;
  }

  .main-text {
    font-size: 172px;
    font-weight: 900;
    line-height: 0.9;
    text-transform: uppercase;
    text-align: center;
    color: #FFFFFF;
    letter-spacing: -3px;
  }

  .highlight {
    color: #C9A035;
  }

  .sub-text {
    margin-top: 60px;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 3px;
    color: #666;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="eyebrow">The result?</div>

  <div class="main-text">
    Your<br>
    competitor<br>
    just got<br>
    <span class="highlight">that job.</span>
  </div>

  <div class="sub-text">And the next one. And the one after.</div>
</body>
</html>
